apis:
  - aid: stats-perform:stats-api
    name: STATS API
    description: >-
      The STATS API from Stats Perform provides a comprehensive REST interface
      for accessing sports data including live scores, box scores, standings,
      schedules, player and team statistics, play-by-play data, editorial
      content, and historical records. The API supports sports including
      American Football (NFL, NCAAF), Baseball (MLB, MiLB), Basketball (NBA,
      NCAAB), Hockey (NHL), Soccer (MLS, EPL, Champions League), Golf (PGA),
      and Tennis (ATP, WTA). Authentication requires an API key and secret.
    humanURL: https://developer.stats.com/
    baseURL: https://api.stats.com/v1
    tags:
