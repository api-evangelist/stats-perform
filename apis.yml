aid: stats-perform
name: Stats Perform
description: >-
  Stats Perform is the world's leading sports data and AI-powered sports
  intelligence company. The STATS API provides access to a vast collection
  of sports data through a unified REST API, including live sports data,
  cumulative season data, and historical data for leagues from around the
  world. Data covers American Football, Baseball, Basketball, Hockey, Soccer,
  Golf, Tennis, and more with in-depth player and team statistics, editorial
  coverage, live scores, standings, schedules, and play-by-play data.
type: Index
position: Consumer
access: 3rd-Party
