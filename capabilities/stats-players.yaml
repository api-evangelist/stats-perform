naftiko: 1.0.0-alpha2
info:
  label: Stats Perform STATS API — Players
  description: 'Stats Perform STATS API — Players. 1 operations. Lead operation: Get Player. Self-contained Naftiko capability
    covering one Stats Perform business surface.'
  tags:
  - Stats Perform
  - Players
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATS_PERFORM_API_KEY: STATS_PERFORM_API_KEY
capability:
  consumes:
  - type: http
    namespace: stats-players
    baseUri: https://api.stats.com/v1
    description: Stats Perform STATS API — Players business capability. Self-contained, no shared references.
    resources:
    - name: stats-sport-leaguePath-players-playerId
      path: /stats/{sport}/{leaguePath}/players/{playerId}
      operations:
      - name: getplayer
        method: GET
        description: Get Player
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: playerId
          in: path
          type: string
          description: The unique player identifier.
          required: true
    authentication:
      type: apikey
      key: api_key
      value: '{{env.STATS_PERFORM_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: stats-players-rest
    port: 8080
    description: REST adapter for Stats Perform STATS API — Players. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/stats/{sport}/{leaguepath}/players/{playerid}
      name: stats-sport-leaguepath-players-playerid
      description: REST surface for stats-sport-leaguePath-players-playerId.
      operations:
      - method: GET
        name: getplayer
        description: Get Player
        call: stats-players.getplayer
        with:
          playerId: rest.playerId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stats-players-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stats Perform STATS API — Players. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-player
      description: Get Player
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stats-players.getplayer
      with:
        playerId: tools.playerId
      outputParameters:
      - type: object
        mapping: $.
